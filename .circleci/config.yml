version: 2.1

jobs:
  typescript-package:
    docker:
      - image: cimg/node:22.21
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - ledger-fortress-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
      - run:
          name: Install TypeScript dependencies
          command: cd client/typescript && npm ci
      - save_cache:
          key: ledger-fortress-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: TypeScript lint
          command: cd client/typescript && npm run lint
      - run:
          name: TypeScript coverage
          command: cd client/typescript && npm run test:coverage
      - persist_to_workspace:
          root: client/typescript
          paths:
            - coverage/lcov.info
      - run:
          name: TypeScript build
          command: cd client/typescript && npm run build
      - run:
          name: Verification script syntax
          command: |
            for script in scripts/verify-rls.sh scripts/verify-functions.sh scripts/verify-anon-denied.sh; do
              bash -n "$script"
            done
      - run:
          name: Package dry run
          command: cd client/typescript && npm pack --dry-run

  python-package:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - ledger-fortress-pip-v1-{{ checksum "client/python/pyproject.toml" }}
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -e './client/python[dev]'
      - save_cache:
          key: ledger-fortress-pip-v1-{{ checksum "client/python/pyproject.toml" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Python compile check
          command: cd client/python && python -m compileall ledger_fortress
      - run:
          name: Python metadata check
          command: cd client/python && python -c "import tomllib; tomllib.load(open('pyproject.toml','rb')); print('pyproject ok')"
      - run:
          name: Python lint
          command: cd client/python && ruff check .

  codecov-upload:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - attach_workspace:
          at: ~/project/client/typescript
      - run:
          name: Upload coverage to Codecov
          command: |
            if [ -z "${CODECOV_TOKEN:-}" ]; then
              echo "CODECOV_TOKEN is not configured in CircleCI; skipping trusted main coverage upload."
              exit 0
            fi
            curl -fsSLO https://cli.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov --auto-load-params-from CircleCI upload-process \
              -Z \
              -t "$CODECOV_TOKEN" \
              -C "$CIRCLE_SHA1" \
              -f client/typescript/coverage/lcov.info \
              --disable-search

workflows:
  package-check:
    jobs:
      - typescript-package
      - python-package
      - codecov-upload:
          requires:
            - typescript-package
          filters:
            branches:
              only: main
