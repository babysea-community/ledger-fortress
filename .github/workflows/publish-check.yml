name: Package Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/typescript/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - name: Upload coverage reports to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: client/typescript/coverage/lcov.info
      - run: npm run build
      - name: Verification script syntax
        run: |
          for script in ../../scripts/verify-rls.sh ../../scripts/verify-functions.sh ../../scripts/verify-anon-denied.sh; do
            bash -n "$script"
          done
      - run: npm pack --dry-run

  python:
    name: Python package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client/python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m compileall ledger_fortress
      - run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb')); print('pyproject ok')"
