include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Code-Quality.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - verify
  - test
  - build
  - security

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "external_pull_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

variables:
  GIT_DEPTH: '0'
  AST_ENABLE_MR_PIPELINES: 'true'
  GITLAB_ADVANCED_SAST_ENABLED: 'true'
  SECURE_LOG_LEVEL: warn
  SAST_EXCLUDED_PATHS: 'client/typescript/coverage,client/typescript/dist,client/typescript/node_modules,client/typescript/.npm,client/python/.cache,client/python/build,client/python/dist,client/python/*.egg-info,.pytest_cache,.ruff_cache,build,dist,public'
  DS_EXCLUDED_PATHS: 'client/typescript/coverage,client/typescript/dist,client/typescript/node_modules,client/typescript/.npm,client/python/.cache,client/python/build,client/python/dist,client/python/*.egg-info,.pytest_cache,.ruff_cache,build,dist,public'
  SECRET_DETECTION_EXCLUDED_PATHS: 'client/typescript/coverage,client/typescript/dist,client/typescript/node_modules,client/typescript/.npm,client/python/.cache,client/python/build,client/python/dist,client/python/*.egg-info,.pytest_cache,.ruff_cache,build,dist,public'
  SECRET_DETECTION_HISTORIC_SCAN: 'true'
  CONTAINER_SCANNING_DISABLED: 'false'
  CS_DISABLE_DEPENDENCY_LIST: 'false'

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

container_scanning:
  stage: security
  rules:
    - if: '$CONTAINER_SCANNING_DISABLED == "true" || $CONTAINER_SCANNING_DISABLED == "1"'
      when: never
    - if: '$CS_IMAGE'
    - when: never

.node-job:
  image: node:22-bookworm
  cache:
    key:
      files:
        - client/typescript/package-lock.json
      prefix: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - client/typescript/.npm/
  before_script:
    - cd client/typescript
    - npm ci --cache .npm --prefer-offline

.python-job:
  image: python:3.12-bookworm
  cache:
    key:
      files:
        - client/python/pyproject.toml
      prefix: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - client/python/.cache/pip/
  variables:
    PIP_CACHE_DIR: .cache/pip
  before_script:
    - cd client/python
    - python -m pip install --upgrade pip
    - python -m pip install -e '.[dev]'

verify:typescript:
  stage: verify
  extends: .node-job
  timeout: 10m
  script:
    - npm run lint

verify:python:
  stage: verify
  extends: .python-job
  timeout: 10m
  script:
    - python -m compileall ledger_fortress
    - python -c "import tomllib; tomllib.load(open('pyproject.toml','rb')); print('pyproject ok')"
    - ruff check .

test:typescript-coverage:
  stage: test
  extends: .node-job
  timeout: 15m
  coverage: '/All files[^|]*\|[^|]*\s+([0-9.]+)/'
  script:
    - npm run test:coverage
  artifacts:
    expire_in: 7 days
    paths:
      - client/typescript/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: client/typescript/coverage/cobertura-coverage.xml

build:typescript:
  stage: build
  extends: .node-job
  timeout: 15m
  script:
    - npm run build
    - for script in ../../scripts/verify-rls.sh ../../scripts/verify-functions.sh ../../scripts/verify-anon-denied.sh; do bash -n "$script"; done
    - npm pack --dry-run

coverage:upload:
  stage: security
  image: alpine:3.22
  needs:
    - job: test:typescript-coverage
      artifacts: true
  timeout: 5m
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache ca-certificates curl
  script:
    - if [ -z "${CODECOV_TOKEN:-}" ]; then echo 'CODECOV_TOKEN is not configured; skipping GitLab Codecov upload.'; exit 0; fi
    - if [ -z "${CODECOV_UPLOADER_SHA256:-}" ]; then echo 'CODECOV_UPLOADER_SHA256 is not configured; skipping GitLab Codecov upload.'; exit 0; fi
    - curl --fail --location --retry 3 --retry-delay 2 --output codecov "${CODECOV_UPLOADER_URL:-https://uploader.codecov.io/latest/linux/codecov}"
    - printf '%s  codecov\n' "$CODECOV_UPLOADER_SHA256" | sha256sum -c -
    - chmod +x codecov
    - ./codecov -Z -t "$CODECOV_TOKEN" -f client/typescript/coverage/lcov.info -F gitlab -n "$CI_JOB_NAME" -C "$CI_COMMIT_SHA"

dependency:audit:
  stage: security
  extends: .node-job
  timeout: 10m
  needs: []
  script:
    - npm audit --omit=dev --audit-level=high

secret:scan:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.28.0
    entrypoint: ['']
  timeout: 5m
  needs: []
  script:
    - gitleaks detect --source . --no-banner --redact